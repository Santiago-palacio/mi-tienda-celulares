<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Venta de celulares. Consulta disponibilidad y encarga por WhatsApp." />
  <title>Celulares en venta</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-header__brand">
        <h1>Celulares</h1>
        <p>Stock actualizado · Encarga por WhatsApp</p>
      </div>
      <div class="search-block">
        <label class="search-block__label" for="search">Buscar en este apartado</label>
        <div class="search-field">
          <svg class="search-field__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input type="search" id="search" class="search-field__input" placeholder="Buscar modelo…" autocomplete="off"
            spellcheck="false" />
        </div>
      </div>
    </div>
  </header>

  <nav class="catalog-tabs-wrap" aria-label="Elegir catálogo">
    <div class="catalog-tabs-inner">
      <div class="catalog-tabs" role="tablist">
        <button type="button" class="catalog-tabs__btn is-active" role="tab" id="tab-iphone" aria-selected="true"
          aria-controls="panel-catalog" data-view="iphone">
          iPhone
        </button>
        <button type="button" class="catalog-tabs__btn" role="tab" id="tab-android" aria-selected="false"
          aria-controls="panel-catalog" data-view="android">
          Android
        </button>
        <button type="button" class="catalog-tabs__btn" role="tab" id="tab-consoles" aria-selected="false"
          aria-controls="panel-catalog" data-view="consolas">
          Consolas
        </button>
      </div>
    </div>
  </nav>

  <section class="brand-marquee" aria-label="Marcas disponibles">
    <div class="brand-marquee__frame">
      <div class="brand-marquee__hint">Marcas destacadas</div>
      <div class="brand-marquee__viewport" aria-hidden="true">
        <div class="brand-marquee__track">
          <!-- Set 1 -->
          <div class="brand-marquee__group">
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-iphone.jfif" alt="iPhone" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-samsung.jfif" alt="Samsung" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-xiaomi.jfif" alt="Xiaomi" loading="lazy" />
            </div>
          </div>
          <!-- Set 2 -->
          <div class="brand-marquee__group" aria-hidden="true">
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-iphone.jfif" alt="iPhone" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-samsung.jfif" alt="Samsung" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-xiaomi.jfif" alt="Xiaomi" loading="lazy" />
            </div>
          </div>
          <!-- Set 3 -->
          <div class="brand-marquee__group" aria-hidden="true">
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-iphone.jfif" alt="iPhone" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-samsung.jfif" alt="Samsung" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-xiaomi.jfif" alt="Xiaomi" loading="lazy" />
            </div>
          </div>
          <!-- Set 4 -->
          <div class="brand-marquee__group" aria-hidden="true">
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-iphone.jfif" alt="iPhone" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-samsung.jfif" alt="Samsung" loading="lazy" />
            </div>
            <div class="brand-marquee__item">
              <img class="brand-logo" src="images/logo-xiaomi.jfif" alt="Xiaomi" loading="lazy" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main class="main-area">
    <p id="catalog-meta" class="catalog-meta" aria-live="polite"></p>
    <div id="catalog" class="catalog">
      <div id="catalog-no-results" class="catalog__no-results" hidden role="status">
        <div class="empty-state">
          <strong>No hay resultados</strong>
          No hay equipos que coincidan con tu búsqueda en este apartado.
        </div>
      </div>
      <div id="catalog-body" class="catalog__body">
        <section id="panel-catalog" class="catalog-section catalog-panel" role="tabpanel" aria-labelledby="tab-iphone">
          <h2 id="catalog-panel-title" class="catalog-section__title">iPhone</h2>
          <p id="catalog-panel-subtitle" class="catalog-section__subtitle">Apple</p>
          <div id="products-grid" class="products-grid"></div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Contacto WhatsApp: 312 242 8834</p>
  </footer>

  <section id="product-detail" class="product-page" aria-hidden="true" hidden>
    <header class="product-page__bar">
      <button type="button" class="product-page__back" id="product-detail-back" aria-label="Volver al catálogo">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m15 18-6-6 6-6" />
        </svg>
        Volver
      </button>
      <span class="product-page__bar-title" id="product-page-bar-title"></span>
    </header>
    <div class="product-page__scroll">
      <div class="product-page__hero">
        <button type="button" class="product-page__nav product-page__nav--prev" id="prev-img"
          aria-label="Imagen anterior">
          ‹
        </button>
        <img id="product-page-img" class="product-page__img" alt="" width="600" height="700" />
        <button type="button" class="product-page__nav product-page__nav--next" id="next-img"
          aria-label="Imagen siguiente">
          ›
        </button>
      </div>
      <div class="product-page__wrap">
        <h1 id="product-page-title" class="product-page__title"></h1>
        <p id="product-page-price" class="product-page__price"></p>
        <div id="product-page-long" class="product-page__long"></div>
        <div class="product-page__section">
          <h2 class="product-page__section-title">Detalles</h2>
          <ul id="product-page-desc" class="product-page__list" aria-label="Detalles del producto"></ul>
        </div>
      </div>
    </div>
    <footer class="product-page__footer">
      <a id="product-page-whatsapp" class="btn-whatsapp btn-whatsapp--page" href="#" target="_blank"
        rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"
          aria-hidden="true">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
        </svg>
        Encargar por WhatsApp
      </a>
    </footer>
  </section>

  <script src="app.js"></script>
</body>

</html>
